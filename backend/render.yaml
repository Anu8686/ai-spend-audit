services:
  - type: web
    name: ai-spend-audit-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://aispendaudit.com
      - key: ALLOWED_ORIGINS
        value: '["https://aispendaudit.com"]'
    healthCheckPath: /api/health
    autoDeploy: true

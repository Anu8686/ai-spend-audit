name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Frontend ─────────────────────────────────────────────────
  frontend:
    name: Frontend (lint + type-check)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint . --ext .ts,.tsx --max-warnings 0

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://api.aispendaudit.com

  # ── Backend ──────────────────────────────────────────────────
  backend:
    name: Backend (lint + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pytest httpx ruff

      - name: Lint (ruff)
        run: ruff check .

      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          SUPABASE_URL: ""
          SUPABASE_KEY: ""
          OPENAI_API_KEY: ""
          RESEND_API_KEY: ""
